name: Python Package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tools
        run: python -m pip install --upgrade pip pytest

      - name: Test Python surfaces
        run: python -m pytest -q python/tests
        env:
          PYTHONPATH: python

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build maturin pytest

      - name: Test Python package
        run: PYTHONPATH=python python -m pytest -q

      - name: Build wheel and source distribution
        run: python -m build

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/montepath-wheel-smoke
          /tmp/montepath-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/montepath-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/montepath-wheel-smoke/bin/python python/tests/installed_package_smoke.py

      - name: Smoke test installed source distribution
        run: |
          python -m venv /tmp/montepath-sdist-smoke
          /tmp/montepath-sdist-smoke/bin/python -m pip install --upgrade pip
          /tmp/montepath-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          /tmp/montepath-sdist-smoke/bin/python python/tests/installed_package_smoke.py

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dist
          path: dist/*
