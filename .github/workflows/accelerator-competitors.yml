name: Accelerator Competitor Benchmarks

on:
  workflow_dispatch:

jobs:
  cuda-competitors:
    runs-on:
      - self-hosted
      - linux
      - x64
      - gpu
      - cuda
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install accelerator competitor environment
        run: python -m pip install -r benchmarks/competitors/requirements-accelerators.txt

      - name: Probe accelerator environment
        run: |
          nvidia-smi
          python - <<'PY'
          import importlib.util
          for name in ("jax", "cupy", "torch"):
              print(name, "installed=", importlib.util.find_spec(name) is not None)
          PY

      - name: Run accelerator competitor baselines
        run: |
          python benchmarks/competitors/python_cpu_baselines.py \
            --paths 100000 \
            --steps 64 \
            --repeats 3 \
            --seed 42 \
            > benchmarks/accelerator-competitors-results.json

      - name: Require populated accelerator rows
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("benchmarks/accelerator-competitors-results.json").read_text())
          rows = {row["library"]: row for row in payload["results"]}
          for name in ("jax", "cupy", "torch"):
              row = rows.get(name)
              if row is None:
                  raise SystemExit(f"{name} row missing")
              if not row["available"]:
                  raise SystemExit(f"{name} unavailable on accelerator runner: {row['note']}")
              telemetry = row.get("telemetry") or {}
              for key in ("warmup_ms", "compile_ms", "execution_ms", "memory_peak_mb", "device"):
                  if key not in telemetry:
                      raise SystemExit(f"{name} telemetry missing {key}")
          PY

      - name: Upload accelerator competitor artifact
        uses: actions/upload-artifact@v4
        with:
          name: accelerator-competitors-results
          path: benchmarks/accelerator-competitors-results.json

