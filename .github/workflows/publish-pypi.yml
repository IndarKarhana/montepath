name: Publish PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish MontePath to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build source distribution
        run: uv run --with build --with "maturin>=1.7,<2" python -m build --sdist

      - name: Publish source distribution to PyPI
        run: uv publish --trusted-publishing always dist/*.tar.gz
