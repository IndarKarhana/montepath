name: Publish PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build source distribution
        run: uv run --with build --with "maturin>=1.7,<2" python -m build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: montepath-sdist
          path: dist/*.tar.gz

  wheels:
    name: Build ${{ matrix.name }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manylinux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - name: macos-universal2
            os: macos-14
            target: universal2-apple-darwin
            manylinux: auto
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --compatibility pypi
          manylinux: ${{ matrix.manylinux }}
          sccache: true

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: montepath-wheel-${{ matrix.name }}
          path: dist/*.whl

  publish:
    name: Publish MontePath to PyPI
    needs:
      - sdist
      - wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: montepath-*
          path: dist
          merge-multiple: true

      - name: Prune already-published distributions
        run: |
          python - <<'PY'
          from html import unescape
          from pathlib import Path
          from urllib.parse import unquote
          from urllib.request import urlopen

          index_html = urlopen("https://pypi.org/simple/montepath/").read().decode("utf-8")
          index_text = unquote(unescape(index_html))

          for path in sorted(Path("dist").iterdir()):
              if path.name in index_text:
                  print(f"Skipping already-published distribution: {path.name}")
                  path.unlink()

          remaining = sorted(path.name for path in Path("dist").iterdir())
          if not remaining:
              raise SystemExit("No new distributions remain to publish.")

          print("Publishing new distributions:")
          for name in remaining:
              print(f"- {name}")
          PY

      - name: Publish distributions to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/montepath/ dist/*
