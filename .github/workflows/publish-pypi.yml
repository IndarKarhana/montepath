name: Publish PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build source distribution
        run: uv run --with build --with "maturin>=1.7,<2" python -m build --sdist

      - name: Smoke test source distribution
        run: |
          python -m venv /tmp/montepath-sdist-smoke
          /tmp/montepath-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          /tmp/montepath-sdist-smoke/bin/python python/tests/installed_package_smoke.py

      - name: Upload source distribution
        uses: actions/upload-artifact@v7
        with:
          name: montepath-sdist
          path: dist/*.tar.gz

  wheels:
    name: Build ${{ matrix.name }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manylinux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
            cargo-features: ""
          - name: macos-universal2
            os: macos-14
            target: universal2-apple-darwin
            manylinux: auto
            cargo-features: "--features metal-native"
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
            cargo-features: ""
    steps:
      - uses: actions/checkout@v6

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --compatibility pypi ${{ matrix.cargo-features }}
          manylinux: ${{ matrix.manylinux }}
          sccache: true

      - name: Smoke test wheel
        run: |
          python -c "import glob, subprocess, sys; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', *glob.glob('dist/*.whl')])"
          python python/tests/installed_package_smoke.py

      - name: Smoke test strict Metal bridge
        if: matrix.name == 'macos-universal2'
        run: |
          python - <<'PY'
          import montepath

          status = montepath.native_runtime_status().as_dict()
          required = {
              "price_european_call_metal",
              "price_arithmetic_asian_call_metal",
              "price_down_and_out_call_metal",
          }
          missing = required.difference(status["supported_functions"])
          if missing:
              raise SystemExit(f"Metal wheel missing bridge functions: {sorted(missing)}")

          selection = montepath.select_backend("european_call", backend="metal")
          if not selection.ok or selection.backend_id != "apple_metal":
              raise SystemExit(f"Metal selection failed: {selection.as_dict()}")

          result = montepath.execute_workload(
              "european_call",
              {"n_paths": 128, "n_steps": 4, "seed": 42},
              backend="metal",
          )
          if not result["ok"] or result["manifest"]["backend"] != "apple_metal":
              raise SystemExit(f"Metal execution failed: {result}")

          inventory = montepath.select_backend("inventory_policy", backend="metal")
          if inventory.ok or inventory.diagnostics[0]["code"] != "MC_BACKEND_METAL_WORKLOAD_UNSUPPORTED":
              raise SystemExit(f"Inventory Metal policy was not explicit: {inventory.as_dict()}")
          PY

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: montepath-wheel-${{ matrix.name }}
          path: dist/*.whl

  publish:
    name: Publish MontePath to PyPI
    needs:
      - sdist
      - wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: montepath-*
          path: dist
          merge-multiple: true

      - name: Prune already-published distributions
        run: |
          python - <<'PY'
          from html import unescape
          from pathlib import Path
          from urllib.parse import unquote
          from urllib.request import urlopen

          index_html = urlopen("https://pypi.org/simple/montepath/").read().decode("utf-8")
          index_text = unquote(unescape(index_html))

          for path in sorted(Path("dist").iterdir()):
              if path.name in index_text:
                  print(f"Skipping already-published distribution: {path.name}")
                  path.unlink()

          remaining = sorted(path.name for path in Path("dist").iterdir())
          if not remaining:
              raise SystemExit("No new distributions remain to publish.")

          print("Publishing new distributions:")
          for name in remaining:
              print(f"- {name}")
          PY

      - name: Publish distributions to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/montepath/ dist/*
