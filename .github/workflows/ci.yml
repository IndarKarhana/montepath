name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test -q

      - name: Test mc-core with cuda-native feature
        run: cargo test -q -p mc-core --features cuda-native

      - name: Test mc-core with metal-native feature
        run: cargo test -q -p mc-core --features metal-native

      - name: Test mc-core with combined native-gpu features
        run: cargo test -q -p mc-core --features "cuda-native metal-native"

      - name: Benchmark harness smoke test
        run: cargo run -p mc-bench -- --output benchmarks/latest-results.json
