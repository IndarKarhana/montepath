name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Scoped Clippy check
        run: |
          cargo clippy --no-deps -p mc-schema --all-targets -- -D warnings
          cargo clippy --no-deps -p montepath-python --all-targets -- -D warnings

      - name: Test
        run: cargo test -q

      - name: Test mc-core with cuda-native feature
        run: cargo test -q -p mc-core --features cuda-native

      - name: Test mc-core with metal-native feature
        run: cargo test -q -p mc-core --features metal-native

      - name: Test mc-core with combined native-gpu features
        run: cargo test -q -p mc-core --features "cuda-native metal-native"

      - name: Test Python extension with metal-native feature
        run: cargo test -q -p montepath-python --features metal-native

      - name: Benchmark harness smoke test
        run: cargo run -p mc-bench -- --output benchmarks/latest-results.json

  quantlib-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: benchmarks/competitors/requirements-quantlib.txt

      - name: Install QuantLib competitor environment
        run: python -m pip install -r benchmarks/competitors/requirements-quantlib.txt

      - name: Verify QuantLib competitor lanes
        run: |
          python benchmarks/competitors/python_cpu_baselines.py \
            --paths 256 \
            --steps 4 \
            --repeats 1 \
            --seed 7 \
            > benchmarks/quantlib-preflight.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("benchmarks/quantlib-preflight.json").read_text())
          quantlib_rows = [
              row for row in payload["results"]
              if row["library"] == "quantlib"
          ]
          if not quantlib_rows:
              raise SystemExit("QuantLib rows missing from preflight payload")
          available = [row for row in quantlib_rows if row["available"]]
          if not available:
              raise SystemExit("QuantLib environment did not produce any available competitor rows")
          european = [
              row for row in available
              if row["methodology"] == "stepwise_paths_quantlib_mceuropean"
          ]
          if not european:
              raise SystemExit("QuantLib European competitor row unavailable")
          unavailable = [row for row in quantlib_rows if not row["available"]]
          if unavailable:
              print(f"QuantLib unavailable rows retained explicitly: {unavailable}")
          PY

      - name: Generate QuantLib-populated benchmark artifact
        run: cargo run -p mc-bench --release -- --output benchmarks/quantlib-ci-results.json

      - name: Upload QuantLib benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: quantlib-ci-results
          path: |
            benchmarks/quantlib-ci-results.json
            benchmarks/quantlib-preflight.json
